<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&family=Newsreader:wght@400;500;700;800&family=Noto+Sans:wght@400;500;700;900"
    />
    <title>Projects & Blog – Felix Kronenwett</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>html { scroll-behavior: smooth; }
      select, input, button, textarea {
        font-family: Newsreader, "Noto Sans", sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="relative flex min-h-screen flex-col bg-white overflow-x-hidden" style='font-family: Newsreader, "Noto Sans", sans-serif;'>
      <header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between border-b border-[#f0f2f4] px-6 md:px-10 h-16 bg-white/95 backdrop-blur shadow-sm">
        <a href="index.html#top" class="flex items-center gap-4 text-[#111418]">
          <div class="size-7">
            <img src="logo.svg" alt="Logo" class="w-full h-full" />
          </div>
          <h2 class="text-[#111418] text-[20px] md:text-[22px] font-bold leading-tight tracking-[-0.015em]">Felix Kronenwett</h2>
        </a>
        <div class="flex flex-1 justify-end gap-6 md:gap-8">
          <nav class="hidden md:flex items-center gap-6 md:gap-9">
            <a class="text-[#111418] text-[16px] md:text-[18px] font-medium hover:text-[#637588] transition-colors" href="index.html#top">Home</a>
            <a class="text-[#111418] text-[16px] md:text-[18px] font-medium hover:text-[#637588] transition-colors" href="index.html#experience">Experience</a>
            <a class="text-[#111418] text-[16px] md:text-[18px] font-medium hover:text-[#637588] transition-colors" href="index.html#education">Education</a>
            <a class="text-[#111418] text-[16px] md:text-[18px] font-medium hover:text-[#637588] transition-colors" href="index.html#publications">Publications</a>
          </nav>
          <a href="projects.html" class="rounded-full size-10 overflow-hidden" aria-label="Projects & Blog">
            <img src="bild_fk.jpg" alt="Projects & Blog" class="w-full h-full object-cover" />
          </a>
        </div>
      </header>

      <main class="px-5 sm:px-10 lg:px-20 flex-1 pt-20 pb-10">
        <div class="max-w-[960px] mx-auto">
          <div class="flex flex-wrap justify-between gap-3 p-4">
            <p class="text-[#111418] text-[28px] md:text-[32px] font-bold leading-tight">Projects & Blog</p>
          </div>

          <div class="flex items-center gap-3 px-4">
            <input
              id="search-posts"
              type="text"
              placeholder="Suche nach Titel oder Datum"
              aria-label="Beiträge durchsuchen"
              class="form-input w-full rounded-lg bg-[#f0f2f4] text-[#111418] placeholder:text-[#637588] px-4 py-2"
            />
            <select id="filter-type" class="form-select rounded-lg bg-[#f0f2f4] text-[#111418] px-3 py-2">
              <option value="all">Alle</option>
              <option value="project">Projekte</option>
              <option value="blog">Blog</option>
            </select>
          </div>

          <div id="posts-list" class="mt-4 space-y-3 px-4">
            <!-- Dynamische Karten -->
          </div>

          <div id="pagination" class="flex items-center justify-center gap-2 mt-6 px-4">
            <!-- Dynamische Pagination -->
          </div>
        </div>
      </main>

      <!-- Einheitlicher, zentrierter Footer -->
      <footer class="mt-auto">
        <div class="px-5 py-10">
          <p class="text-center text-[#637588] text-base">
            © 2025 Felix Kronenwett. All rights reserved.
          </p>
        </div>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="projects.js"></script>
    <script src="enhancements.js"></script>
  </body>
</html>
